name: Vue App CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # This job runs linting and unit tests on every push/PR
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit -- --run # The --run flag makes vitest exit after running

  # This job builds the application
  build:
    needs: test # This job only runs if the 'test' job succeeds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/

  # This job deploys the application to a staging environment
  deploy_staging:
    needs: build
    runs-on: ubuntu-latest
    # Only run this job on pushes to the 'develop' branch
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.your-app.com # Replace with your staging URL

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          # Add your deployment script here, e.g., using rsync, scp, or a provider-specific CLI
          # Example using scp:
          # scp -r ./* user@staging-server:/var/www/staging

  # This job deploys the application to production
  deploy_production:
    needs: build
    runs-on: ubuntu-latest
    # Only run this job on pushes to the 'main' branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://your-app.com # Replace with your production URL

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files

      - name: Deploy to Production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment script here
          # Use GitHub secrets for credentials
          # e.g., scp -i ${{ secrets.PROD_SSH_KEY }} -r ./* user@prod-server:/var/www/html