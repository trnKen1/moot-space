name: Reusable Vue App CI/CD

on:
  workflow_call:

jobs:
  # This job runs linting and unit tests on every push/PR
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so Turborepo can diff against a base ref once
          # --filter=...[<base>] affected-package filtering is introduced
          # (not used yet: with a single workspace package there's nothing
          # to gain, and getting the base ref right differs between push
          # and pull_request events).
          fetch-depth: 0

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit -- --run # The --run flag makes vitest exit after running

  # This job builds the application
  build:
    needs: test # This job only runs if the 'test' job succeeds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
